@for (item of modulosRoutes; track item.label) {
    <div class="w-2/5 h-10 gap-">
        @if (item.label) {
            <button [routerLink]="item.routerLink" class="h-full w-full rounded-md hover:brightness-[1.10]" [style]="{background: item['color']}">
                <p>{{ item.label }}</p>
            </button>
        }
    </div>
}
