@for (item of opciones(); track item.label) {
<div class="w-2/5 h-min mb-5">
    @if (item.label) {
    <div class="flex flex-col gap-5">
        <div class="w-full h-2" [style]="{background: item['color']}"></div>
        <div class="flex justify-between">
            <div class="flex gap-3">
                <span class="material-icons p-3" [style]="{background: item['color']}">
                    {{ item.icon }}
                </span>
                <p>{{item.label}}</p>
            </div>
        </div>
        <div class="flex flex-wrap w-full gap-10">
            @for (ele of item.items; track $index) {
            <app-seleccion [item]="ele"></app-seleccion>
            }
        </div>
    </div>
    }
</div>
}
