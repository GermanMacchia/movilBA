<div class="rounded-md flex flex-col items-center gap-3 bg-cyan-100 p-4">
    <p class="font-medium">{{ titulo().toUpperCase() }}</p>
    @for (item of opcionesRoutes(); let index = $index; track index) {
        <button class="bg-blue-500 text-white font-medium p-2 rounded-md shadow-md w-56 text-wrap"
                (click)="menu.toggle($event)">{{ item.label }}
        </button>
        <p-tieredmenu #menu [model]="item.items" [popup]="true"/>
    }
</div>
