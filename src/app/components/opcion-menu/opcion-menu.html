<div class="h-2" [style]=" {background: '#8DE2D6' }"></div>
<div class="p-4 flex flex-col gap-4 w-full">
    <div class="flex items-center gap-6">
        <span class="material-icons p-1 rounded-sm" [style]="{'font-size': '2rem', background: '#8DE2D6'}">
            {{ opcion().icon }}
        </span>
        <p class="font-semibold">{{opcion().label}}</p>
    </div>
    <div class="grid grid-cols-2 gap-3">
        @for (item of opcion().items; track $index) {
        <div class="flex items-center gap-3 justify-between w-full p-1 text-left">
            <p>{{item.label}}</p>
            <i class="material-icons-outlined cursor-pointer">arrow_circle_right</i>
        </div>
        }
    </div>
</div>
