@if (appService.isDrawerOpen()) {
<div [style]="{width: '15rem', 'box-shadow': 'none', border: 'none'}" class="bg-ui flex flex-col h-screen">
    <div class="flex items-center gap-2 mt-4 mx-3">
        <div class="rounded-md bg-green-200 p-2 px-3 m-2">
            <p class="text-3xl">M</p>
        </div>
        <div class="mx-5 flex flex-col items-start">
            <p class="text-lg">MóvilBA</p>
            <p class="text-sm text-gray-500">Workspace</p>
        </div>
        <button (click)="appService.switchDrawer()" class="h-12 bg-ui">
            <i class="material-symbols-outlined">
                left_panel_close
            </i>
        </button>
    </div>

    <div class="flex flex-col flex-grow my-4 w-full">
        @for (item of menuItems(); track item.label) {
        <div [class]="item.label === 'Salir' ? 'mt-auto': ''">
            <button [disabled]="item.icon === 'pi pi-user'"
                [class]="item.icon === 'pi pi-user' ? 'pointer-events-none' :''" (click)="item.command()"
                class="h-12 px-5 w-full bg-ui hover:brightness-[1.10]">
                <span class="flex items-center gap-4 side-menu">
                    <i class="material-symbols-outlined">
                        {{ item.icon }}
                    </i>
                    <p class="font-medium"> {{ item.label }} </p>
                </span>
            </button>
        </div>
        }
    </div>

</div>
}
