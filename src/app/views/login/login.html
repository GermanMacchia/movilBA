<div id="background-image"></div>
<p-card class="w-96">
    <ng-template #header>
        <span class="material-icons py-6 w-full text-center text-gray-300"
            style="font-size: 7rem;">directions_bus</span>
    </ng-template>
    <div class="flex flex-col gap-4 items-center justify-center">
        <!--email-->
        <div class="flex flex-col gap-2 w-full">
            <label for="cuit" class="text-left text-xl">Cuit/Cuil</label>
            <input name="cuit" pInputText [(ngModel)]="cuit" autocomplete="off" class="w-full" />
        </div>
        <!--password-->
        <div class="flex flex-col gap-2 w-full">
            <label for="clave" class="text-left text-xl">Contraseña</label>
            <p-password name="clave" [(ngModel)]="clave" inputStyleClass="w-full" [feedback]="false" class="w-full" />
        </div>
    </div>
    <ng-template #footer>
        <div class="flex flex-col items-center gap-2 mt-5">
            <p class="hover:cursor-pointer">¿Olvidaste tu contraseña?</p>
            <p-button [loading]="loading()" [disabled]="!cuit || !clave" (onClick)="submit()"
                [label]="loading() ? '' :'Ingresar'" class="w-full" styleClass="h-10 w-full bg-yellow-500" />
        </div>
    </ng-template>
</p-card>
